<!DOCTYPE html><html><head><meta charset='UTF-8'><title>QUANTUM | VELOCITY MINER</title><style>:root{--p:#00ff75;} body{background:#000;color:#fff;font-family:monospace;overflow:hidden;} canvas{position:fixed;inset:0;z-index:1;filter:blur(1px) contrast(1.2);} .hud{position:fixed;top:40px;left:40px;z-index:100;border-left:2px solid var(--p);padding-left:20px;letter-spacing:5px;} .status{color:var(--p); font-weight:900; animation: blink 0.2s infinite; } @keyframes blink{ 50%{ opacity:0.2; } }</style></head><body><div class='hud'>NODE: VELOCITY_MINER_V1<br>ROLE: QUANTUM_VELOCITY_GENERATOR<br>SPEED: <span id='val'>0</span> Q-m/s<br>STATUS: <span class='status'>WARP_ACTIVE</span></div><canvas id='c'></canvas><script>const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();function draw(){t+=0.2;ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';ctx.lineWidth=2;const cx=w/2,cy=h/2;for(let i=0;i<30;i++){let r=(t*20+i*20)%(w*0.8);ctx.beginPath();ctx.moveTo(cx+r,cy);ctx.lineTo(cx+r+10,cy);ctx.stroke();ctx.beginPath();ctx.moveTo(cx-r,cy);ctx.lineTo(cx-r-10,cy);ctx.stroke();ctx.beginPath();ctx.moveTo(cx,cy+r);ctx.lineTo(cx,cy+r+10);ctx.stroke();ctx.beginPath();ctx.moveTo(cx,cy-r);ctx.lineTo(cx,cy-r-10);ctx.stroke();}document.getElementById('val').innerText=(1000 + Math.random()*9000).toFixed(0);requestAnimationFrame(draw);}draw();</script></body></html>
